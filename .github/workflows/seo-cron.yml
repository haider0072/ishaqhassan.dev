name: SEO Cron

on:
  push:
    branches: [main]
    paths:
      - 'sitemap.xml'
  schedule:
    # Daily IndexNow re-ping at 01:00 UTC = 06:00 PKT
    - cron: '0 1 * * *'
    # Weekly digest at 04:00 UTC Monday = 09:00 PKT Monday
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'indexnow'
        type: choice
        options:
          - indexnow
          - digest
          - both

jobs:
  indexnow:
    if: github.event_name == 'push' || (github.event_name == 'schedule' && github.event.schedule == '0 1 * * *') || (github.event_name == 'workflow_dispatch' && (inputs.job == 'indexnow' || inputs.job == 'both'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: IndexNow ping
        run: node scripts/seo-indexnow.mjs

      - name: Commit state file
        run: |
          if [ -n "$(git status --porcelain .seo-state/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .seo-state/
            git commit -m "chore(seo): update IndexNow ping state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi

  digest:
    if: (github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1') || (github.event_name == 'workflow_dispatch' && (inputs.job == 'digest' || inputs.job == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send weekly digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GSC_OAUTH: ${{ secrets.GSC_OAUTH }}
        run: node scripts/seo-weekly-digest.mjs
