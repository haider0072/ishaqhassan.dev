<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#0a0f1f"/>
    <stop offset="0.5" stop-color="#0e1f3a"/>
    <stop offset="1" stop-color="#1e0e41"/>
  </linearGradient>
  <radialGradient id="glow1" cx="950" cy="160" r="380" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.45"/>
    <stop offset="1" stop-color="#7dd3fc" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="240" cy="540" r="320" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#a78bfa" stop-opacity="0.4"/>
    <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="centerGlow" cx="600" cy="340" r="260" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#fbbf24" stop-opacity="0.18"/>
    <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="wand" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fde68a"/>
    <stop offset="0.6" stop-color="#fbbf24"/>
    <stop offset="1" stop-color="#7c3aed"/>
  </linearGradient>
  <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#7dd3fc"/>
    <stop offset="1" stop-color="#a78bfa"/>
  </linearGradient>
  <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6"/>
  </filter>
  <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="12"/>
  </filter>
</defs>

<rect width="1200" height="675" fill="url(#bg)"/>
<rect width="1200" height="675" fill="url(#glow1)"/>
<rect width="1200" height="675" fill="url(#glow2)"/>
<rect width="1200" height="675" fill="url(#centerGlow)"/>

<!-- Subtle grid -->
<g opacity="0.06" stroke="#fff" stroke-width="1" fill="none">
  <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200 M0 600 H1200"/>
  <path d="M100 0 V675 M300 0 V675 M500 0 V675 M700 0 V675 M900 0 V675 M1100 0 V675"/>
</g>

<!-- Magic spell trail orbit -->
<g fill="none" stroke="url(#trail)" stroke-width="2.5" opacity="0.7">
  <ellipse cx="600" cy="340" rx="260" ry="80" stroke-dasharray="4 8"/>
  <ellipse cx="600" cy="340" rx="220" ry="120" transform="rotate(60 600 340)" stroke-dasharray="4 10" opacity="0.5"/>
  <ellipse cx="600" cy="340" rx="220" ry="120" transform="rotate(-60 600 340)" stroke-dasharray="4 10" opacity="0.5"/>
</g>

<!-- Tag pill: top-left -->
<g transform="translate(60, 50)">
  <rect x="0" y="0" rx="26" ry="26" width="290" height="52" fill="rgba(125,211,252,0.14)" stroke="rgba(125,211,252,0.45)" stroke-width="1.5"/>
  <text x="145" y="34" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="16" font-weight="700" fill="#7dd3fc" letter-spacing="3">FLUTTER · AI · 2026</text>
</g>

<!-- Three platform "kingdoms" connected by spell -->
<!-- iOS / Apple -->
<g transform="translate(180, 280)">
  <circle r="56" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="0" y="14" text-anchor="middle" font-size="56" fill="#e5e7eb">iOS</text>
  <text x="0" y="92" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="2" font-weight="600">APPLE</text>
</g>

<!-- Center: Wand + Spell -->
<g transform="translate(600, 340)">
  <!-- Bloom halo -->
  <circle r="100" fill="#fbbf24" opacity="0.08" filter="url(#bloom)"/>
  <circle r="60" fill="#a78bfa" opacity="0.12" filter="url(#bloom)"/>
  <!-- Wand -->
  <g transform="rotate(-32)">
    <rect x="-4" y="-90" width="8" height="180" rx="4" fill="url(#wand)"/>
    <circle cx="0" cy="-90" r="14" fill="#fde68a"/>
    <circle cx="0" cy="-90" r="6" fill="#fff"/>
  </g>
  <!-- Spell sparkles -->
  <g fill="#fde68a">
    <circle cx="-70" cy="-40" r="3.5"/>
    <circle cx="60" cy="50" r="2.5"/>
    <circle cx="80" cy="-30" r="3"/>
    <circle cx="-60" cy="60" r="2"/>
    <circle cx="100" cy="20" r="2.5"/>
    <circle cx="-90" cy="20" r="2"/>
  </g>
  <!-- Flutter F mark, subtle -->
  <text x="0" y="135" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="800" fill="#7dd3fc" letter-spacing="4">FLUTTER</text>
</g>

<!-- Android -->
<g transform="translate(1020, 280)">
  <circle r="56" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="0" y="14" text-anchor="middle" font-size="50" fill="#e5e7eb">🤖</text>
  <text x="0" y="92" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="2" font-weight="600">ANDROID</text>
</g>

<!-- Web -->
<g transform="translate(600, 130)">
  <circle r="42" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="0" y="11" text-anchor="middle" font-size="40" fill="#e5e7eb">🌐</text>
  <text x="0" y="76" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="2" font-weight="600">WEB</text>
</g>

<!-- Connection beams -->
<g stroke="url(#trail)" stroke-width="2" fill="none" opacity="0.4" filter="url(#soft)">
  <path d="M236 280 Q 420 250 545 320"/>
  <path d="M964 280 Q 780 250 655 320"/>
  <path d="M600 172 L 600 260"/>
</g>

<!-- AI badge: bottom right -->
<g transform="translate(820, 555)">
  <rect x="0" y="0" rx="28" ry="28" width="330" height="56" fill="rgba(168,139,250,0.16)" stroke="rgba(168,139,250,0.55)" stroke-width="1.5"/>
  <text x="165" y="36" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#c4b5fd" font-weight="700" letter-spacing="3">AI WRITES · YOU DECIDE</text>
</g>

<!-- TITLE + SUBTITLE BAND (bottom-left) -->
<g transform="translate(60, 440)">
  <text font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="60" font-weight="800" fill="#ffffff" letter-spacing="-1.2">One Spell,</text>
  <text y="68" font-family="-apple-system, sans-serif" font-size="60" font-weight="800" fill="#7dd3fc" letter-spacing="-1.2">Every Kingdom.</text>
  <text y="118" font-family="-apple-system, sans-serif" font-size="20" font-weight="500" fill="#cbd5e1">Why Flutter still matters in the AI era.</text>
</g>

<!-- Author byline (bottom) -->
<g transform="translate(60, 612)">
  <circle cx="14" cy="14" r="14" fill="#fbbf24"/>
  <text x="14" y="19" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#0a0f1f">IH</text>
  <text x="40" y="19" font-family="-apple-system, sans-serif" font-size="14" fill="#cbd5e1" font-weight="600">Ishaq Hassan</text>
  <text x="160" y="19" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8">· ishaqhassan.dev</text>
</g>

</svg>
